name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-core:
    name: Build core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore src/FreeFlow.Core/FreeFlow.Core.csproj

      - name: Build
        run: dotnet build src/FreeFlow.Core/FreeFlow.Core.csproj -c Release --no-restore

  build-wpf:
    name: Build WPF (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore src/FreeFlow.Wpf/FreeFlow.Wpf.csproj

      - name: Build
        run: dotnet build src/FreeFlow.Wpf/FreeFlow.Wpf.csproj -c Release --no-restore

